<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Brendza's Exercise 2</title>
  <link rel="stylesheet" href="../css/style.css">
  <script src="../js/ex2.js" defer></script>
  <style>
    /* Add spacing between each country suggestion */
    .suggestion {
      padding-left: 2px;
      padding-right: 2px;
    }   
    /* Change suggestion color when hovering it with the mouse */
    .suggestion:hover {
      background-color: #adf;
      cursor: pointer;
    }
    /* Position the suggestion list just below the input box */
    #suggestions {
      position: absolute;
      border: 1px solid black;
      left: 155px;
    }
  </style>
</head>
<body>
  <a href="../index.html">Link to Start Page</a> <br>
  <label for="country">Enter a country name</label>:
  <input type="text" id="country">
  <div id="suggestions"></div>
</body>
</html>
